{% extends 'base.html' %}

{% block title %}Edit Project - Dashboard Admin{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-warning p-4">
                    <h3 class="fw-bold mb-0 text-dark"><i class="fa-solid fa-pen-to-square me-2"></i>Edit Project</h3>
                </div>
                <div class="card-body p-4 p-md-5">
                    
                    <!-- Form POST mengarah ke URL edit_project dengan ID yang bersangkutan -->
                    <!-- enctype="multipart/form-data" WAJIB ada jika form mengirimkan sebuah file -->
                    <form action="{{ url_for('edit_project', id=project.id) }}" method="POST" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label for="title" class="form-label fw-bold">Judul Project *</label>
                            <!-- Nilai 'value' diisi dengan data dari database -->
                            <input type="text" class="form-control bg-light" id="title" name="title" value="{{ project.title }}" required>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-bold">Deskripsi Lengkap *</label>
                            <textarea class="form-control bg-light" id="description" name="description" rows="5" required>{{ project.description }}</textarea>
                        </div>

                        <div class="mb-4">
                            <label for="image" class="form-label fw-bold">Gambar/Screenshot Project Baru (Opsional)</label>
                            
                            <!-- Tampilkan info gambar yang terpasang saat ini jika ada -->
                            {% if project.image %}
                            <div class="mb-2">
                                <span class="badge bg-success"><i class="fa-solid fa-image me-1"></i> Gambar saat ini: {{ project.image }}</span>
                            </div>
                            {% endif %}
                            
                            <input class="form-control bg-light" type="file" id="image" name="image" accept="image/png, image/jpeg, image/jpg, image/gif">
                            <div class="form-text">Biarkan kosong jika tidak ingin mengubah gambar. Format: JPG, JPEG, PNG, GIF.</div>
                        </div>

                        <div class="mb-4">
                            <label for="tech_stack" class="form-label fw-bold">Teknologi yang Digunakan</label>
                            <input type="text" class="form-control bg-light" id="tech_stack" name="tech_stack" value="{{ project.tech_stack or '' }}">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label for="demo_link" class="form-label fw-bold">Link Live Demo (Opsional)</label>
                                <input type="url" class="form-control bg-light" id="demo_link" name="demo_link" value="{{ project.demo_link or '' }}">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="github_link" class="form-label fw-bold">Link Repository GitHub (Opsional)</label>
                                <input type="url" class="form-control bg-light" id="github_link" name="github_link" value="{{ project.github_link or '' }}">
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4 border-top pt-4">
                            <a href="{{ url_for('dashboard_projects') }}" class="btn btn-secondary">Batal</a>
                            <button type="submit" class="btn btn-warning fw-bold text-dark"><i class="fa-solid fa-save me-2"></i>Perbarui Project</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
