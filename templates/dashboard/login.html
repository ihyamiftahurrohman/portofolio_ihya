<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Web Portofolio</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom Dark Theme CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background: var(--bg-primary); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem;">

    <!-- Blob dekorasi latar belakang -->
    <div style="position: fixed; top: -150px; left: -150px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(159,18,57,0.12) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 0;"></div>
    <div style="position: fixed; bottom: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(225,29,72,0.1) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 0;"></div>

    <main style="width: 100%; max-width: 420px; position: relative; z-index: 1;">
        <div class="login-card">

            <!-- Header -->
            <div class="text-center mb-4">
                <!-- Logo / Brand -->
                <a href="{{ url_for('index') }}" style="display: inline-block; margin-bottom: 1.5rem; font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, #9f1239, #e11d48); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none;">
                    &lt;Portofolio /&gt;
                </a>
                <div style="width: 60px; height: 60px; background: rgba(159,18,57,0.15); border: 1px solid rgba(159,18,57,0.3); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.2rem;">
                    <i class="fa-solid fa-shield-halved" style="font-size: 1.5rem; background: linear-gradient(135deg, #9f1239, #e11d48); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;"></i>
                </div>
                <h1 style="font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.4rem;">Login Admin</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Masuk ke panel administrasi Anda</p>
            </div>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show mb-4" role="alert" style="font-size: 0.9rem; border-radius: 12px;">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- Form Login -->
            <form action="{{ url_for('login') }}" method="POST">

                <div class="mb-3">
                    <label for="username" style="font-size: 0.82rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 0.5rem;">Username</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;">
                            <i class="fa-solid fa-user"></i>
                        </span>
                        <input type="text" id="username" name="username" required placeholder="Masukkan username"
                               style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.8rem; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; color: var(--text-primary); font-family: 'Outfit', sans-serif; font-size: 0.95rem; outline: none; transition: all 0.25s;"
                               onfocus="this.style.borderColor='rgba(159,18,57,0.5)'; this.style.boxShadow='0 0 0 3px rgba(159,18,57,0.1)'"
                               onblur="this.style.borderColor='rgba(255,255,255,0.07)'; this.style.boxShadow='none'">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" style="font-size: 0.82rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 0.5rem;">Password</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem;">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="password" name="password" required placeholder="Masukkan password"
                               style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.8rem; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; color: var(--text-primary); font-family: 'Outfit', sans-serif; font-size: 0.95rem; outline: none; transition: all 0.25s;"
                               onfocus="this.style.borderColor='rgba(159,18,57,0.5)'; this.style.boxShadow='0 0 0 3px rgba(159,18,57,0.1)'"
                               onblur="this.style.borderColor='rgba(255,255,255,0.07)'; this.style.boxShadow='none'">
                    </div>
                </div>

                <button type="submit"
                        style="width: 100%; padding: 0.85rem; background: linear-gradient(135deg, #9f1239, #e11d48); border: none; border-radius: 10px; color: #fff; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 20px rgba(159,18,57,0.3);"
                        onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 30px rgba(159,18,57,0.4)'"
                        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 20px rgba(159,18,57,0.3)'">
                    <i class="fa-solid fa-right-to-bracket me-2"></i> Masuk
                </button>
            </form>

            <!-- Kembali ke Home -->
            <div class="text-center mt-4">
                <a href="{{ url_for('index') }}" style="color: var(--text-muted); font-size: 0.88rem; text-decoration: none; transition: color 0.2s;"
                   onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-muted)'">
                    <i class="fa-solid fa-arrow-left me-1"></i> Kembali ke Halaman Utama
                </a>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
